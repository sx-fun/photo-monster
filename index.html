<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/nav-component.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar" id="main-nav"></nav>

    <!-- 英雄区域 -->
    <section class="hero">
        <div class="hero-content">
            <h1>Photo Monster</h1>
            <p class="hero-subtitle">你的 AI 摄影导师</p>
            <p class="hero-description">上传照片获取AI专业点评，从构图到后期全方位提升摄影技能</p>
            <div class="hero-buttons">
                <a href="pages/photo-analysis.html" class="btn btn-primary">
                    <i class="fas fa-upload"></i> 开始分析
                </a>
                <a href="pages/planner.html" class="btn btn-secondary">
                    <i class="fas fa-clipboard-list"></i> 拍摄方案
                </a>
            </div>
        </div>
    </section>

    <!-- 精选知识预览 -->
    <section class="featured-knowledge-section">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title">
                    <i class="fas fa-star"></i>
                    精选知识
                </h2>
                <a href="pages/knowledge.html" class="view-all-link">
                    查看全部 <i class="fas fa-arrow-right"></i>
                </a>
            </div>
            <div class="featured-knowledge-grid">
                <a href="pages/knowledge.html" class="featured-knowledge-card">
                    <div class="knowledge-card-icon">
                        <i class="fas fa-bullseye"></i>
                    </div>
                    <h4>构图法则</h4>
                    <p>三分法、黄金分割、引导线等经典构图技巧</p>
                </a>
                <a href="pages/knowledge.html" class="featured-knowledge-card">
                    <div class="knowledge-card-icon">
                        <i class="fas fa-sun"></i>
                    </div>
                    <h4>光线运用</h4>
                    <p>自然光、人造光、黄金时刻的光线控制</p>
                </a>
                <a href="pages/knowledge.html" class="featured-knowledge-card">
                    <div class="knowledge-card-icon">
                        <i class="fas fa-user"></i>
                    </div>
                    <h4>人像摄影</h4>
                    <p>摆姿引导、光线布置、情感捕捉技巧</p>
                </a>
                <a href="pages/knowledge.html" class="featured-knowledge-card">
                    <div class="knowledge-card-icon">
                        <i class="fas fa-mountain"></i>
                    </div>
                    <h4>风光摄影</h4>
                    <p>风景构图、滤镜使用、长曝光技术</p>
                </a>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Photo Monster. All rights reserved. <span style="opacity: 0.6;">v45</span></p>
            <p>基于 WorkBuddy photo-monster 技能构建</p>
            <p><a href="pages/privacy.html">隐私政策</a> · <a href="pages/terms.html">使用条款</a> · <a href="pages/content-complaint.html">侵权投诉</a> · <a href="pages/admin-update.html" style="opacity: 0.6; font-size: 0.85em;">管理</a></p>
        </div>
    </footer>

    <!-- 加载脚本 -->
    <script src="js/lazy-load.js"></script>
    <script src="js/nav-component.js"></script>
    <script src="js/app.js"></script>
    <script>
        // 首页简化脚本 - 仅处理基础交互
        document.addEventListener('DOMContentLoaded', function() {
            // 导航栏由 nav-component.js 自动初始化

            // 初始化懒加载
            if (window.initLazyLoad) {
                window.initLazyLoad({
                    selector: '.lazy-container',
                    rootMargin: '100px',
                    threshold: 0.1
                });
            }

            // 注册 Service Worker
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js')
                    .then((registration) => {
                        console.log('Service Worker 注册成功:', registration);
                        
                        // 检测更新
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    // 有新版本可用
                                    showUpdateNotification();
                                }
                            });
                        });
                    })
                    .catch((error) => {
                        console.log('Service Worker 注册失败:', error);
                    });
                
                // 监听 Service Worker 消息
                navigator.serviceWorker.addEventListener('message', (event) => {
                    if (event.data === 'reload') {
                        window.location.reload();
                    }
                });
            }
        });
        
        // 显示更新提示
        function showUpdateNotification() {
            const updateBanner = document.createElement('div');
            updateBanner.id = 'update-banner';
            updateBanner.innerHTML = `
                <div class="update-content">
                    <i class="fas fa-sync-alt"></i>
                    <span>发现新版本，点击更新获取最新功能</span>
                    <button onclick="updateApp()">立即更新</button>
                    <button onclick="dismissUpdate()">稍后</button>
                </div>
            `;
            document.body.appendChild(updateBanner);
        }
        
        // 更新应用
        function updateApp() {
            if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage('skipWaiting');
            }
        }
        
        // 关闭更新提示
        function dismissUpdate() {
            const banner = document.getElementById('update-banner');
            if (banner) banner.remove();
        }
    </script>
</body>
</html>
