<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>侵权投诉 - Photo Monster</title>
    <meta name="description" content="Photo Monster 侵权投诉页面 - 提交内容侵权举报">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/nav-component.css">
    <link rel="stylesheet" href="../css/pages.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .complaint-section {
            padding: 40px 20px 60px;
            min-height: calc(100vh - 200px);
        }
        .complaint-content {
            max-width: 800px;
            margin: 0 auto;
        }
        .complaint-intro {
            background: var(--bg-primary);
            border-radius: var(--radius-md);
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: var(--shadow-md);
            border-left: 4px solid #e74c3c;
        }
        .complaint-intro h2 {
            color: var(--text-primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .complaint-intro h2 i {
            color: #e74c3c;
        }
        .complaint-intro p {
            color: var(--text-secondary);
            line-height: 1.8;
        }
        .process-steps {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .process-step {
            background: var(--bg-primary);
            border-radius: var(--radius-md);
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }
        .process-step .step-number {
            width: 40px;
            height: 40px;
            background: var(--primary-color);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin: 0 auto 12px;
        }
        .process-step h4 {
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .process-step p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .complaint-form {
            background: var(--bg-primary);
            border-radius: var(--radius-md);
            padding: 30px;
            box-shadow: var(--shadow-md);
        }
        .complaint-form h3 {
            color: var(--text-primary);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--bg-secondary);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: var(--text-primary);
            font-weight: 500;
            margin-bottom: 8px;
        }
        .form-group label .required {
            color: #e74c3c;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }
        .form-hint {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 6px;
        }
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px;
            background: #fff3cd;
            border-radius: var(--radius-sm);
            margin-bottom: 20px;
        }
        .checkbox-group input {
            margin-top: 3px;
            width: 18px;
            height: 18px;
        }
        .checkbox-group label {
            color: #856404;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        .btn-submit {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-submit:hover {
            background: var(--primary-dark);
        }
        .btn-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .contact-alternative {
            background: #e8f4fd;
            border-radius: var(--radius-md);
            padding: 20px;
            margin-top: 30px;
        }
        .contact-alternative h4 {
            color: var(--text-primary);
            margin-bottom: 10px;
        }
        .contact-alternative p {
            color: var(--text-secondary);
            line-height: 1.8;
        }
        .contact-alternative a {
            color: var(--primary-color);
        }
        .success-message {
            display: none;
            background: #d4edda;
            border: 1px solid #c3e6cb;
            border-radius: var(--radius-md);
            padding: 30px;
            text-align: center;
        }
        .success-message i {
            font-size: 48px;
            color: #28a745;
            margin-bottom: 16px;
        }
        .success-message h3 {
            color: #155724;
            margin-bottom: 12px;
        }
        .success-message p {
            color: #155724;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar" id="main-nav"></nav>

    <!-- 页面标题 -->
    <section class="page-header">
        <div class="container">
            <h1><i class="fas fa-shield-alt"></i> 侵权投诉</h1>
            <p>维护合法权益，共建健康社区</p>
        </div>
    </section>

    <!-- 投诉内容 -->
    <section class="complaint-section">
        <div class="container">
            <div class="complaint-content">
                <!-- 功能开发中提示 -->
                <div class="coming-soon-notice" style="background: linear-gradient(135deg, #fff3cd 0%, #ffeaa7 100%); border: 1px solid #ffc107; border-radius: 12px; padding: 40px; text-align: center; margin-bottom: 30px;">
                    <i class="fas fa-tools" style="font-size: 48px; color: #f39c12; margin-bottom: 20px;"></i>
                    <h2 style="color: #856404; margin-bottom: 16px;">功能开发中</h2>
                    <p style="color: #856404; font-size: 1.1rem; line-height: 1.8; max-width: 600px; margin: 0 auto;">
                        侵权投诉功能正在开发中，暂时无法提交投诉表单。<br>
                        照片墙功能上线后将同步启用此功能。
                    </p>
                </div>

                <!-- 替代联系方式 -->
                <div class="contact-alternative" style="background: var(--bg-primary); border-radius: var(--radius-md); padding: 30px; box-shadow: var(--shadow-md);">
                    <h4><i class="fas fa-envelope"></i> 联系我们</h4>
                    <p style="margin-bottom: 16px;">如您有紧急投诉需求，请通过以下方式联系我们：</p>
                    <ul style="list-style: none; padding: 0;">
                        <li style="margin: 12px 0; display: flex; align-items: center; gap: 10px;">
                            <i class="fab fa-github" style="color: var(--primary-color);"></i>
                            <span>GitHub Issue: <a href="https://github.com/sx-fun/photo-monster/issues" target="_blank">https://github.com/sx-fun/photo-monster/issues</a></span>
                        </li>
                    </ul>
                    <p style="margin-top: 20px; color: var(--text-secondary); font-size: 0.9rem;">
                        请在邮件/Issue 中详细说明侵权情况并提供相关证明，我们将尽快处理。
                    </p>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Photo Monster. All rights reserved.</p>
            <p>
                <a href="privacy.html">隐私政策</a> · <a href="terms.html">使用条款</a> · <a href="content-complaint.html">侵权投诉</a> · <a href="admin-update.html" style="opacity: 0.6; font-size: 0.85em;">管理</a>
            </p>
        </div>
    </footer>

    <script src="../js/nav-component.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('complaintFormElement');
            const formContainer = document.getElementById('complaintForm');
            const successMessage = document.getElementById('successMessage');
            const submitBtn = form.querySelector('.btn-submit');

            form.addEventListener('submit', function(e) {
                e.preventDefault();
                
                // 禁用提交按钮
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 提交中...';

                // 收集表单数据
                const formData = new FormData(form);
                const data = Object.fromEntries(formData.entries());

                // 模拟提交（实际应发送到服务器）
                setTimeout(() => {
                    // 保存到本地存储（实际项目中应发送到服务器）
                    const complaints = JSON.parse(localStorage.getItem('photoMonster_complaints') || '[]');
                    complaints.push({
                        ...data,
                        id: 'CMP' + Date.now(),
                        status: 'pending',
                        submitTime: new Date().toISOString()
                    });
                    localStorage.setItem('photoMonster_complaints', JSON.stringify(complaints));

                    // 显示成功消息
                    formContainer.style.display = 'none';
                    successMessage.style.display = 'block';
                    
                    // 滚动到成功消息
                    successMessage.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 1500);
            });

            // 汉堡菜单
            const hamburger = document.querySelector('.hamburger');
            const navMenu = document.querySelector('.nav-menu');
            if (hamburger) {
                hamburger.addEventListener('click', function() {
                    navMenu.classList.toggle('active');
                });
            }
        });
    </script>
</body>
</html>
