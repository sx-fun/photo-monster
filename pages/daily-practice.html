<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日一练 - Photo Monster</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/nav-component.css">
    <link rel="stylesheet" href="../css/pages.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 每日一练专用样式 */
        .practice-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 0;
        }
        
        .practice-header h1 {
            font-size: 32px;
            margin-bottom: 12px;
        }
        
        .practice-header p {
            opacity: 0.9;
            font-size: 16px;
        }
        
        .streak-info {
            display: flex;
            gap: 30px;
            margin-top: 24px;
        }
        
        .streak-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.15);
            padding: 12px 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }
        
        .streak-icon {
            font-size: 28px;
        }
        
        .streak-text {
            font-size: 13px;
            opacity: 0.9;
        }
        
        .streak-number {
            font-size: 24px;
            font-weight: 700;
        }
        
        /* 挑战类型标签 */
        .challenge-types {
            display: flex;
            gap: 12px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        
        .type-tag {
            padding: 8px 16px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .type-tag:hover {
            border-color: #667eea;
            color: #667eea;
        }
        
        .type-tag.active {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }
        
        /* 挑战卡片 */
        .challenges-section {
            padding: 40px 0;
        }
        
        .section-title {
            font-size: 22px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .challenges-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
        }
        
        .challenge-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 2px solid transparent;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .challenge-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }
        
        .challenge-card.completed {
            border-color: #4CAF50;
            background: #f8fff8;
        }
        
        .challenge-card.in-progress {
            border-color: #2196F3;
        }
        
        .challenge-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .badge-today {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .badge-completed {
            background: #4CAF50;
            color: white;
        }
        
        .challenge-type {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            color: #667eea;
            font-weight: 500;
            font-size: 14px;
        }
        
        .challenge-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #1a1a2e;
        }
        
        .challenge-description {
            font-size: 15px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 16px;
        }
        
        .challenge-meta {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: #888;
            margin-bottom: 16px;
        }
        
        .challenge-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .challenge-tips {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
        }
        
        .challenge-tips h4 {
            font-size: 14px;
            margin-bottom: 10px;
            color: #555;
        }
        
        .challenge-tips ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .challenge-tips li {
            font-size: 13px;
            color: #666;
            padding: 4px 0;
            padding-left: 20px;
            position: relative;
        }
        
        .challenge-tips li::before {
            content: '•';
            position: absolute;
            left: 8px;
            color: #667eea;
        }
        
        .challenge-actions {
            display: flex;
            gap: 12px;
        }
        
        .btn-challenge {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-challenge.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-challenge.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-challenge.secondary {
            background: #f0f0f0;
            color: #666;
        }
        
        .btn-challenge.secondary:hover {
            background: #e0e0e0;
        }
        
        .btn-challenge:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }
        
        /* 历史记录 */
        .history-section {
            padding: 40px 0;
            background: #f8f9fa;
        }
        
        .history-list {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        
        .history-item {
            display: flex;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }
        
        .history-item:last-child {
            border-bottom: none;
        }
        
        .history-item:hover {
            background: #f8f9fa;
        }
        
        .history-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 16px;
            flex-shrink: 0;
        }
        
        .history-icon.completed {
            background: #e8f5e9;
            color: #4CAF50;
        }
        
        .history-icon.pending {
            background: #fff3e0;
            color: #FF9800;
        }
        
        .history-content {
            flex: 1;
        }
        
        .history-title {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .history-meta {
            font-size: 13px;
            color: #888;
        }
        
        .history-xp {
            font-weight: 700;
            color: #667eea;
        }
        
        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalSlideIn 0.3s ease;
        }
        
        @keyframes modalSlideIn {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .modal-header {
            padding: 24px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h3 {
            font-size: 20px;
        }
        
        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #f0f0f0;
            cursor: pointer;
            font-size: 18px;
            transition: background 0.2s;
        }
        
        .modal-close:hover {
            background: #e0e0e0;
        }
        
        .modal-body {
            padding: 24px;
        }
        
        /* 问答样式 */
        .quiz-question {
            margin-bottom: 24px;
        }
        
        .quiz-question h4 {
            font-size: 16px;
            margin-bottom: 16px;
            line-height: 1.5;
        }
        
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .quiz-option {
            padding: 14px 16px;
            background: #f8f9fa;
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 15px;
        }
        
        .quiz-option:hover {
            background: #e8eaf6;
            border-color: #667eea;
        }
        
        .quiz-option.selected {
            background: #e8eaf6;
            border-color: #667eea;
        }
        
        .quiz-option.correct {
            background: #e8f5e9;
            border-color: #4CAF50;
        }
        
        .quiz-option.wrong {
            background: #ffebee;
            border-color: #f44336;
        }
        
        /* 上传区域 */
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9fa;
        }
        
        .upload-area.dragover {
            border-color: #667eea;
            background: #e8eaf6;
        }
        
        .upload-icon {
            font-size: 48px;
            color: #ccc;
            margin-bottom: 16px;
        }
        
        .upload-text {
            font-size: 16px;
            color: #666;
            margin-bottom: 8px;
        }
        
        .upload-hint {
            font-size: 13px;
            color: #999;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .streak-info {
                flex-direction: column;
                gap: 12px;
            }
            
            .challenges-grid {
                grid-template-columns: 1fr;
            }
            
            .challenge-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar" id="main-nav"></nav>

    <!-- 头部区域 -->
    <section class="practice-header">
        <div class="container">
            <h1><i class="fas fa-calendar-day"></i> 每日一练</h1>
            <p>每天一个小挑战，坚持练习成为更好的摄影师</p>
            
            <div class="streak-info">
                <div class="streak-item">
                    <div class="streak-icon">🔥</div>
                    <div>
                        <div class="streak-text">连续打卡</div>
                        <div class="streak-number" id="streakCount">0 天</div>
                    </div>
                </div>
                <div class="streak-item">
                    <div class="streak-icon">⭐</div>
                    <div>
                        <div class="streak-text">今日获得</div>
                        <div class="streak-number" id="todayXP">0 XP</div>
                    </div>
                </div>
                <div class="streak-item">
                    <div class="streak-icon">🏆</div>
                    <div>
                        <div class="streak-text">累计完成</div>
                        <div class="streak-number" id="totalCompleted">0 个</div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 今日挑战 -->
    <section class="challenges-section">
        <div class="container">
            <h2 class="section-title">
                <i class="fas fa-star" style="color: #FFD700;"></i>
                今日挑战
            </h2>
            
            <!-- 挑战类型筛选 -->
            <div class="challenge-types">
                <div class="type-tag active" data-type="all">
                    <i class="fas fa-th-large"></i> 全部
                </div>
                <div class="type-tag" data-type="quiz">
                    <i class="fas fa-question-circle"></i> 知识问答
                </div>
                <div class="type-tag" data-type="shooting">
                    <i class="fas fa-camera"></i> 拍摄挑战
                </div>
                <div class="type-tag" data-type="analysis">
                    <i class="fas fa-eye"></i> 作品分析
                </div>
                <div class="type-tag" data-type="practice">
                    <i class="fas fa-dumbbell"></i> 技巧练习
                </div>
            </div>
            
            <!-- 挑战列表 -->
            <div class="challenges-grid" id="challengesGrid">
                <!-- 动态生成挑战卡片 -->
            </div>
        </div>
    </section>

    <!-- 练习历史 -->
    <section class="history-section">
        <div class="container">
            <h2 class="section-title">
                <i class="fas fa-history"></i>
                练习历史
            </h2>
            
            <div class="history-list" id="historyList">
                <!-- 动态生成历史记录 -->
            </div>
        </div>
    </section>

    <!-- 挑战模态框 -->
    <div class="modal-overlay" id="challengeModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">挑战标题</h3>
                <button class="modal-close" id="modalClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- 动态内容 -->
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="main-footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-links">
                    <a href="privacy.html">隐私政策</a>
                    <a href="terms.html">使用条款</a>
                    <a href="about.html">关于我们</a>
                </div>
                <p class="copyright">&copy; 2024 Photo Monster. 保留所有权利。</p>
            </div>
        </div>
    </footer>

    <!-- 脚本 -->
    <script src="../js/knowledge-base-meta.js"></script>
    <script src="../js/daily-practice.js"></script>
    <script src="../js/nav-component.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            new NavComponent();
        });
    </script>
</body>
</html>
