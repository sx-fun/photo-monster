<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏 - Photo Monster</title>
    <meta name="description" content="Photo Monster 我的收藏 - 管理你收藏的摄影方案、器材套装">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/nav-component.css">
    <link rel="stylesheet" href="../css/pages.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 收藏页面专用样式 */
        .favorites-section {
            padding: 40px 20px 60px;
            min-height: calc(100vh - 200px);
        }
        
        /* 分类标签 */
        .category-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 16px;
        }
        
        .category-tab {
            padding: 10px 20px;
            border: none;
            background: transparent;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .category-tab:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
        
        .category-tab.active {
            background: var(--primary-color);
            color: white;
        }
        
        .category-tab .count {
            background: rgba(255,255,255,0.3);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
        }
        
        .category-tab.active .count {
            background: rgba(255,255,255,0.5);
        }
        
        /* 收藏列表 */
        .favorites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        
        .favorite-card {
            background: var(--bg-primary);
            border-radius: var(--radius-md);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            transition: all 0.2s;
            position: relative;
        }
        
        .favorite-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        
        .favorite-card .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .favorite-card .card-type {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .favorite-card .card-type.plan {
            background: rgba(52, 152, 219, 0.1);
            color: #3498db;
        }
        
        .favorite-card .card-type.combo {
            background: rgba(46, 204, 113, 0.1);
            color: #27ae60;
        }
        
        .favorite-card .card-type.knowledge {
            background: rgba(155, 89, 182, 0.1);
            color: #9b59b6;
        }
        
        .favorite-card .card-actions {
            display: flex;
            gap: 8px;
        }
        
        .favorite-card .action-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--bg-secondary);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        
        .favorite-card .action-btn:hover {
            background: var(--primary-color);
            color: white;
        }
        
        .favorite-card .action-btn.delete:hover {
            background: #e74c3c;
        }
        
        .favorite-card .card-title {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.4;
        }
        
        .favorite-card .card-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .favorite-card .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        .favorite-card .card-date {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .favorite-card .card-price {
            color: var(--primary-color);
            font-weight: 500;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }
        
        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
        
        .empty-state h3 {
            margin-bottom: 12px;
            color: var(--text-primary);
        }
        
        .empty-state p {
            margin-bottom: 24px;
        }
        
        .empty-state .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        /* 批量操作栏 */
        .batch-actions {
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: var(--primary-light);
            border-radius: var(--radius-sm);
            margin-bottom: 20px;
        }
        
        .batch-actions.active {
            display: flex;
        }
        
        .batch-actions .selected-count {
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .batch-actions .actions {
            display: flex;
            gap: 12px;
        }
        
        .batch-actions button {
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        
        .batch-actions .btn-export {
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        
        .batch-actions .btn-delete {
            background: #e74c3c;
            color: white;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .favorites-grid {
                grid-template-columns: 1fr;
            }
            
            .category-tabs {
                overflow-x: auto;
                flex-wrap: nowrap;
                -webkit-overflow-scrolling: touch;
            }
            
            .category-tab {
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar" id="main-nav"></nav>

    <!-- 页面标题 -->
    <section class="page-header">
        <div class="container">
            <h1><i class="fas fa-star"></i> 我的收藏</h1>
            <p>管理你收藏的摄影方案、器材套装和知识内容</p>
        </div>
    </section>

    <!-- 收藏内容区域 -->
    <section class="favorites-section">
        <div class="container">
            <!-- 分类标签 -->
            <div class="category-tabs">
                <button class="category-tab active" data-category="all">
                    <i class="fas fa-th-large"></i>
                    全部
                    <span class="count" id="count-all">0</span>
                </button>
                <button class="category-tab" data-category="plan">
                    <i class="fas fa-lightbulb"></i>
                    拍摄方案
                    <span class="count" id="count-plan">0</span>
                </button>
                <button class="category-tab" data-category="combo">
                    <i class="fas fa-box-open"></i>
                    器材套装
                    <span class="count" id="count-combo">0</span>
                </button>
                <button class="category-tab" data-category="knowledge">
                    <i class="fas fa-book"></i>
                    知识内容
                    <span class="count" id="count-knowledge">0</span>
                </button>
            </div>

            <!-- 批量操作栏 -->
            <div class="batch-actions" id="batchActions">
                <span class="selected-count">已选择 <span id="selectedCount">0</span> 项</span>
                <div class="actions">
                    <button class="btn-export" onclick="favoritesManager.exportSelected()">
                        <i class="fas fa-download"></i> 导出
                    </button>
                    <button class="btn-delete" onclick="favoritesManager.deleteSelected()">
                        <i class="fas fa-trash"></i> 删除
                    </button>
                </div>
            </div>

            <!-- 收藏列表 -->
            <div class="favorites-grid" id="favoritesGrid">
                <!-- 动态生成 -->
            </div>

            <!-- 空状态 -->
            <div class="empty-state" id="emptyState" style="display: none;">
                <i class="fas fa-star"></i>
                <h3>还没有收藏内容</h3>
                <p>在方案规划、套装推荐等页面点击收藏按钮，即可在这里查看</p>
                <a href="planner.html" class="btn btn-primary">
                    <i class="fas fa-lightbulb"></i> 去探索方案
                </a>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2026 Photo Monster. All rights reserved.</p>
            <p>
                <a href="privacy.html">隐私政策</a> · <a href="terms.html">使用条款</a> · <a href="content-complaint.html">侵权投诉</a> · <a href="admin-update.html" style="opacity: 0.6; font-size: 0.85em;">管理</a>
            </p>
        </div>
    </footer>

    <script src="../js/nav-component.js"></script>
    <script src="../js/favorites.js"></script>
</body>
</html>
