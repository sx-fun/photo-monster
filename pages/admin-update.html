    <style>
        /* 更新管理页面专用样式 */
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 20px 40px;
        }

        .admin-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 30px;
            border-radius: var(--radius-lg);
            margin-bottom: 30px;
        }

        .admin-header h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .admin-header p {
            opacity: 0.9;
        }

        .version-info {
            display: flex;
            gap: 30px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .version-item {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: var(--radius-md);
        }

        .version-item label {
            font-size: 0.85rem;
            opacity: 0.8;
            display: block;
        }

        .version-item span {
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* 更新卡片 */
        .update-section {
            background: white;
            border-radius: var(--radius-lg);
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: var(--shadow-sm);
        }

        .update-section h2 {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .update-section h2 i {
            color: var(--primary-color);
        }

        .update-badge {
            background: var(--error-color);
            color: white;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 10px;
        }

        /* 更新列表 */
        .update-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .update-item {
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 20px;
            transition: var(--transition);
        }

        .update-item:hover {
            border-color: var(--primary-color);
            box-shadow: var(--shadow-md);
        }

        .update-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .update-item-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .update-item-type {
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 12px;
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }

        .update-item-desc {
            color: var(--text-secondary);
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .update-item-meta {
            display: flex;
            gap: 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 15px;
        }

        .update-item-meta i {
            margin-right: 5px;
        }

        .update-item-actions {
            display: flex;
            gap: 10px;
        }

        .update-item-actions button {
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            border: none;
        }

        .btn-preview {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .btn-preview:hover {
            background: var(--border-color);
        }

        .btn-apply {
            background: var(--success-color);
            color: white;
        }

        .btn-apply:hover {
            background: #059669;
        }

        .btn-ignore {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .btn-ignore:hover {
            color: var(--error-color);
            border-color: var(--error-color);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* 批量操作 */
        .batch-actions {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .btn-batch {
            padding: 12px 24px;
            border-radius: var(--radius-md);
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-batch-apply {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .btn-batch-apply:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-batch-export {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .btn-batch-export:hover {
            background: var(--border-color);
        }

        /* 历史记录 */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
        }

        .history-item-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .history-version {
            font-weight: 600;
            color: var(--text-primary);
        }

        .history-date {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .history-changes {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .history-status {
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--success-color);
            font-size: 0.9rem;
        }

        /* 预览模态框 */
        .preview-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .preview-modal.active {
            display: flex;
        }

        .preview-content {
            background: white;
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .preview-header h3 {
            margin: 0;
        }

        .preview-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .preview-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }

        .preview-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .preview-stat {
            text-align: center;
            padding: 15px;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            flex: 1;
        }

        .preview-stat-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .preview-stat-value.add { color: var(--success-color); }
        .preview-stat-value.modify { color: var(--accent-color); }
        .preview-stat-value.delete { color: var(--error-color); }

        .preview-stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        /* 状态指示器 */
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;

        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }

        .status-published {
            background: #d1fae5;
            color: #065f46;
        }

        .status-rollback {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>

    <script>
        // 管理员会话配置
        const SESSION_KEY = 'pm_admin_session';
        const SESSION_DURATION = 30 * 60 * 1000; // 30分钟

        // 检查是否已登录
        function checkAdminAuth() {
            const session = localStorage.getItem(SESSION_KEY);
            if (!session) return false;
            
            try {
                const sessionData = JSON.parse(session);
                const now = Date.now();
                if (now - sessionData.timestamp > SESSION_DURATION) {
                    localStorage.removeItem(SESSION_KEY);
                    return false;
                }
                return true;
            } catch (e) {
                localStorage.removeItem(SESSION_KEY);
                return false;
            }
        }

        // 显示登录弹窗
        function showLoginModal() {
            // 先清除可能损坏的会话数据
            localStorage.removeItem(SESSION_KEY);
            
            const modal = document.createElement('div');
            modal.className = 'preview-modal';
            modal.id = 'loginModal';
            modal.style.display = 'flex';
            modal.innerHTML = `
                <div class="preview-content" style="max-width: 400px; text-align: center;">
                    <div class="preview-header" style="justify-content: center;">
                        <h3><i class="fas fa-lock"></i> 管理员验证</h3>
                    </div>
                    <div class="preview-body" style="padding: 30px;">
                        <p style="margin-bottom: 20px; color: var(--text-secondary);">请输入管理员密码以继续</p>
                        <input type="password" id="adminPassword" placeholder="密码" style="
                            width: 100%;
                            padding: 12px;
                            border: 2px solid var(--border-color);
                            border-radius: var(--radius-md);
                            font-size: 1rem;
                            margin-bottom: 15px;
                            text-align: center;
                        ">
                        <div id="loginError" style="color: #ef4444; font-size: 0.85rem; margin-bottom: 15px; display: none;">
                            密码错误，请重试
                        </div>
                        <button onclick="handleLogin()" style="
                            width: 100%;
                            padding: 12px;
                            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
                            color: white;
                            border: none;
                            border-radius: var(--radius-md);
                            font-size: 1rem;
                            cursor: pointer;
                            margin-bottom: 10px;
                        ">
                            <i class="fas fa-sign-in-alt"></i> 登录
                        </button>
                        <button onclick="clearAllSessionData()" style="
                            width: 100%;
                            padding: 10px;
                            background: transparent;
                            color: var(--text-secondary);
                            border: 1px solid var(--border-color);
                            border-radius: var(--radius-md);
                            font-size: 0.85rem;
                            cursor: pointer;
                        ">
                            <i class="fas fa-trash-alt"></i> 清除缓存数据
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            // 回车提交
            document.getElementById('adminPassword').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') handleLogin();
            });
            document.getElementById('adminPassword').focus();
        }

        // 清除所有会话数据
        function clearAllSessionData() {
            localStorage.removeItem(SESSION_KEY);
            localStorage.removeItem('pm_applied_changes');
            localStorage.removeItem('pm_update_history');
            localStorage.removeItem('pm_current_version');
            localStorage.removeItem('pm_last_update');
            alert('缓存数据已清除，请刷新页面重试');
            location.reload();
        }

        // 简单的 MD5 哈希函数
        function md5(string) {
            function rotateLeft(lValue, iShiftBits) {
                return (lValue << iShiftBits) | (lValue >>> (32 - iShiftBits));
            }
            function addUnsigned(lX, lY) {
                var lX4, lY4, lX8, lY8, lResult;
                lX8 = (lX & 0x80000000);
                lY8 = (lY & 0x80000000);
                lX4 = (lX & 0x40000000);
                lY4 = (lY & 0x40000000);
                lResult = (lX & 0x3FFFFFFF) + (lY & 0x3FFFFFFF);
                if (lX4 & lY4) return (lResult ^ 0x80000000 ^ lX8 ^ lY8);
                if (lX4 | lY4) {
                    if (lResult & 0x40000000) return (lResult ^ 0xC0000000 ^ lX8 ^ lY8);
                    else return (lResult ^ 0x40000000 ^ lX8 ^ lY8);
                } else {
                    return (lResult ^ lX8 ^ lY8);
                }
            }
            function f(x, y, z) { return (x & y) | ((~x) & z); }
            function g(x, y, z) { return (x & z) | (y & (~z)); }
            function h(x, y, z) { return (x ^ y ^ z); }
            function i(x, y, z) { return (y ^ (x | (~z))); }
            function ff(a, b, c, d, x, s, ac) {
                a = addUnsigned(a, addUnsigned(addUnsigned(f(b, c, d), x), ac));
                return addUnsigned(rotateLeft(a, s), b);
            }
            function gg(a, b, c, d, x, s, ac) {
                a = addUnsigned(a, addUnsigned(addUnsigned(g(b, c, d), x), ac));
                return addUnsigned(rotateLeft(a, s), b);
            }
            function hh(a, b, c, d, x, s, ac) {
                a = addUnsigned(a, addUnsigned(addUnsigned(h(b, c, d), x), ac));
                return addUnsigned(rotateLeft(a, s), b);
            }
            function ii(a, b, c, d, x, s, ac) {
                a = addUnsigned(a, addUnsigned(addUnsigned(i(b, c, d), x), ac));
                return addUnsigned(rotateLeft(a, s), b);
            }
            function convertToWordArray(string) {
                var lWordCount;
                var lMessageLength = string.length;
                var lNumberOfWordsTemp1 = lMessageLength + 8;
                var lNumberOfWordsTemp2 = (lNumberOfWordsTemp1 - (lNumberOfWordsTemp1 % 64)) / 64;
                var lNumberOfWords = (lNumberOfWordsTemp2 + 1) * 16;
                var lWordArray = new Array(lNumberOfWords - 1);
                var lBytePosition = 0;
                var lByteCount = 0;
                while (lByteCount < lMessageLength) {
                    lWordCount = (lByteCount - (lByteCount % 4)) / 4;
                    lBytePosition = (lByteCount % 4) * 8;
                    lWordArray[lWordCount] = (lWordArray[lWordCount] | (string.charCodeAt(lByteCount) << lBytePosition));
                    lByteCount++;
                }
                lWordCount = (lByteCount - (lByteCount % 4)) / 4;
                lBytePosition = (lByteCount % 4) * 8;
                lWordArray[lWordCount] = lWordArray[lWordCount] | (0x80 << lBytePosition);
                lWordArray[lNumberOfWords - 2] = lMessageLength << 3;
                lWordArray[lNumberOfWords - 1] = lMessageLength >>> 29;
                return lWordArray;
            }
            function wordToHex(lValue) {
                var wordToHexValue = "", wordToHexValueTemp = "", lByte, lCount;
                for (lCount = 0; lCount <= 3; lCount++) {
                    lByte = (lValue >>> (lCount * 8)) & 255;
                    wordToHexValueTemp = "0" + lByte.toString(16);
                    wordToHexValue = wordToHexValue + wordToHexValueTemp.substr(wordToHexValueTemp.length - 2, 2);
                }
                return wordToHexValue;
            }
            var x = [];
            var k, AA, BB, CC, DD, a, b, c, d;
            var S11 = 7, S12 = 12, S13 = 17, S14 = 22;
            var S21 = 5, S22 = 9, S23 = 14, S24 = 20;
            var S31 = 4, S32 = 11, S33 = 16, S34 = 23;
            var S41 = 6, S42 = 10, S43 = 15, S44 = 21;
            x = convertToWordArray(string);
            a = 0x67452301; b = 0xEFCDAB89; c = 0x98BADCFE; d = 0x10325476;
            for (k = 0; k < x.length; k += 16) {
                AA = a; BB = b; CC = c; DD = d;
                a = ff(a, b, c, d, x[k + 0], S11, 0xD76AA478);
                d = ff(d, a, b, c, x[k + 1], S12, 0xE8C7B756);
                c = ff(c, d, a, b, x[k + 2], S13, 0x242070DB);
                b = ff(b, c, d, a, x[k + 3], S14, 0xC1BDCEEE);
                a = ff(a, b, c, d, x[k + 4], S11, 0xF57C0FAF);
                d = ff(d, a, b, c, x[k + 5], S12, 0x4787C62A);
                c = ff(c, d, a, b, x[k + 6], S13, 0xA8304613);
                b = ff(b, c, d, a, x[k + 7], S14, 0xFD469501);
                a = ff(a, b, c, d, x[k + 8], S11, 0x698098D8);
                d = ff(d, a, b, c, x[k + 9], S12, 0x8B44F7AF);
                c = ff(c, d, a, b, x[k + 10], S13, 0xFFFF5BB1);
                b = ff(b, c, d, a, x[k + 11], S14, 0x895CD7BE);
                a = ff(a, b, c, d, x[k + 12], S11, 0x6B901122);
                d = ff(d, a, b, c, x[k + 13], S12, 0xFD987193);
                c = ff(c, d, a, b, x[k + 14], S13, 0xA679438E);
                b = ff(b, c, d, a, x[k + 15], S14, 0x49B40821);
                a = gg(a, b, c, d, x[k + 1], S21, 0xF61E2562);
                d = gg(d, a, b, c, x[k + 6], S22, 0xC040B340);
                c = gg(c, d, a, b, x[k + 11], S23, 0x265E5A51);
                b = gg(b, c, d, a, x[k + 0], S24, 0xE9B6C7AA);
                a = gg(a, b, c, d, x[k + 5], S21, 0xD62F105D);
                d = gg(d, a, b, c, x[k + 10], S22, 0x2441453);
                c = gg(c, d, a, b, x[k + 15], S23, 0xD8A1E681);
                b = gg(b, c, d, a, x[k + 4], S24, 0xE7D3FBC8);
                a = gg(a, b, c, d, x[k + 9], S21, 0x21E1CDE6);
                d = gg(d, a, b, c, x[k + 14], S22, 0xC33707D6);
                c = gg(c, d, a, b, x[k + 3], S23, 0xF4D50D87);
                b = gg(b, c, d, a, x[k + 8], S24, 0x455A14ED);
                a = gg(a, b, c, d, x[k + 13], S21, 0xA9E3E905);
                d = gg(d, a, b, c, x[k + 2], S22, 0xFCEFA3F8);
                c = gg(c, d, a, b, x[k + 7], S23, 0x676F02D9);
                b = gg(b, c, d, a, x[k + 12], S24, 0x8D2A4C8A);
                a = hh(a, b, c, d, x[k + 5], S31, 0xFFFA3942);
                d = hh(d, a, b, c, x[k + 8], S32, 0x8771F681);
                c = hh(c, d, a, b, x[k + 11], S33, 0x6D9D6122);
                b = hh(b, c, d, a, x[k + 14], S34, 0xFDE5380C);
                a = hh(a, b, c, d, x[k + 1], S31, 0xA4BEEA44);
                d = hh(d, a, b, c, x[k + 4], S32, 0x4BDECFA9);
                c = hh(c, d, a, b, x[k + 7], S33, 0xF6BB4B60);
                b = hh(b, c, d, a, x[k + 10], S34, 0xBEBFBC70);
                a = hh(a, b, c, d, x[k + 13], S31, 0x289B7EC6);
                d = hh(d, a, b, c, x[k + 0], S32, 0xEAA127FA);
                c = hh(c, d, a, b, x[k + 3], S33, 0xD4EF3085);
                b = hh(b, c, d, a, x[k + 6], S34, 0x4881D05);
                a = hh(a, b, c, d, x[k + 9], S31, 0xD9D4D039);
                d = hh(d, a, b, c, x[k + 12], S32, 0xE6DB99E5);
                c = hh(c, d, a, b, x[k + 15], S33, 0x1FA27CF8);
                b = hh(b, c, d, a, x[k + 2], S34, 0xC4AC5665);
                a = ii(a, b, c, d, x[k + 0], S41, 0xF4292244);
                d = ii(d, a, b, c, x[k + 7], S42, 0x432AFF97);
                c = ii(c, d, a, b, x[k + 14], S43, 0xAB9423A7);
                b = ii(b, c, d, a, x[k + 5], S44, 0xFC93A039);
                a = ii(a, b, c, d, x[k + 12], S41, 0x655B59C3);
                d = ii(d, a, b, c, x[k + 3], S42, 0x8F0CCC92);
                c = ii(c, d, a, b, x[k + 10], S43, 0xFFEFF47D);
                b = ii(b, c, d, a, x[k + 1], S44, 0x85845DD1);
                a = ii(a, b, c, d, x[k + 8], S41, 0x6FA87E4F);
                d = ii(d, a, b, c, x[k + 15], S42, 0xFE2CE6E0);
                c = ii(c, d, a, b, x[k + 6], S43, 0xA3014314);
                b = ii(b, c, d, a, x[k + 13], S44, 0x4A0811A1);
                a = ii(a, b, c, d, x[k + 4], S43, 0xF7537E82);
                d = ii(d, a, b, c, x[k + 11], S42, 0xBD3AF235);
                c = ii(c, d, a, b, x[k + 2], S43, 0x2AD7D2BB);
                b = ii(b, c, d, a, x[k + 9], S44, 0xEB86D391);
                a = addUnsigned(a, AA);
                b = addUnsigned(b, BB);
                c = addUnsigned(c, CC);
                d = addUnsigned(d, DD);
            }
            var tempValue = wordToHex(a) + wordToHex(b) + wordToHex(c) + wordToHex(d);
            return tempValue.toLowerCase();
        }

        // 处理登录
        function handleLogin() {
            const passwordInput = document.getElementById('adminPassword');
            const password = passwordInput.value;
            
            // 使用简单的字符串比对（避免 MD5 计算问题）
            // 实际密码：234625
            const correctPassword = '234625';
            
            if (password === correctPassword) {
                // 登录成功，创建会话
                localStorage.setItem(SESSION_KEY, JSON.stringify({
                    timestamp: Date.now(),
                    authenticated: true
                }));
                document.getElementById('loginModal').remove();
                initPageAfterAuth();
            } else {
                // 登录失败
                document.getElementById('loginError').style.display = 'block';
                passwordInput.value = '';
                passwordInput.focus();
            }
        }

        // 退出登录
        function logout() {
            localStorage.removeItem(SESSION_KEY);
            location.reload();
        }

        // 初始化页面
        document.addEventListener('DOMContentLoaded', async function() {
            // 检查认证状态
            if (!checkAdminAuth()) {
                showLoginModal();
                return;
            }
            await initPageAfterAuth();
        });

        async function initPageAfterAuth() {
            showLoading('正在初始化...');
            
            try {
                // 等待UpdateManager初始化（最多等待10秒）
                let attempts = 0;
                const maxAttempts = 100; // 10秒
                
                while ((!window.updateManager || !window.updateManager.config) && attempts < maxAttempts) {
                    await new Promise(r => setTimeout(r, 100));
                    attempts++;
                }
                
                if (!window.updateManager || !window.updateManager.config) {
                    throw new Error('更新管理器初始化超时，请刷新页面重试');
                }

                updateVersionInfo();
                renderUpdateHistory();
                hideLoading();
                
                // 添加退出登录按钮
                addLogoutButton();
                
                // 监听更新发现事件
                window.addEventListener('updatesFound', (e) => {
                    showSuccessToast(`检测到 ${e.detail.count} 个新更新`);
                    checkForUpdates();
                });
                
            } catch (error) {
                hideLoading();
                showErrorToast('初始化失败: ' + error.message);
                console.error('[AdminUpdate] 初始化失败:', error);
            }
        }

        // 添加退出登录按钮
        function addLogoutButton() {
            const adminHeader = document.querySelector('.admin-header');
            if (adminHeader) {
                const logoutBtn = document.createElement('button');
                logoutBtn.innerHTML = '<i class="fas fa-sign-out-alt"></i> 退出';
                logoutBtn.style.cssText = `
                    position: absolute;
                    top: 20px;
                    right: 20px;
                    background: rgba(255,255,255,0.2);
                    border: 1px solid rgba(255,255,255,0.3);
                    color: white;
                    padding: 8px 16px;
                    border-radius: 6px;
                    cursor: pointer;
                    font-size: 0.9rem;
                    transition: all 0.2s;
                `;
                logoutBtn.onmouseover = () => logoutBtn.style.background = 'rgba(255,255,255,0.3)';
                logoutBtn.onmouseout = () => logoutBtn.style.background = 'rgba(255,255,255,0.2)';
                logoutBtn.onclick = logout;
                adminHeader.style.position = 'relative';
                adminHeader.appendChild(logoutBtn);
            }
        }

        // 更新版本信息
        function updateVersionInfo() {
            const stats = window.updateManager.getUpdateStats();
            document.getElementById('currentVersion').textContent = stats.currentVersion;
            document.getElementById('lastUpdated').textContent = new Date(stats.lastUpdate).toLocaleString('zh-CN');
            document.getElementById('pendingCount').textContent = stats.pendingCount;
            document.getElementById('updateBadge').textContent = stats.pendingCount;
        }

        // 检查更新
        async function checkForUpdates() {
            showLoading('正在检查更新...');
            
            try {
                const updates = await window.updateManager.checkForUpdates();
                const report = window.updateManager.generateUpdateReport(updates);
                
                hideLoading();
                
                if (report.hasUpdates) {
                    renderPendingUpdates(report.updates);
                    showSuccessToast(`发现 ${report.updates.length} 个更新`);
                } else {
                    renderPendingUpdates([]);
                    showInfoToast('暂无新更新');
                }
            } catch (error) {
                hideLoading();
                showErrorToast('检查更新失败: ' + error.message);
            }
        }

        // 渲染待审核更新
        function renderPendingUpdates(updates) {
            const container = document.getElementById('pendingUpdates');
            const batchActions = document.getElementById('batchActions');
            
            if (!updates || updates.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-check-circle"></i>
                        <p>暂无待审核更新</p>
                        <p style="font-size: 0.9rem; margin-top: 10px;">点击"检查更新"按钮检测新内容</p>
                    </div>
                `;
                batchActions.style.display = 'none';
                return;
            }

            container.innerHTML = `
                <div class="update-list">
                    ${updates.map(u => `
                        <div class="update-item" data-id="${u.id}">
                            <div class="update-item-header">
                                <span class="update-item-title">${u.name}</span>
                                <span class="update-item-type">${u.type || '内容更新'}</span>
                            </div>
                            <div class="update-item-desc">${u.description}</div>
                            <div class="update-item-meta">
                                <span><i class="fas fa-file"></i> ${u.file}</span>
                                <span><i class="fas fa-clock"></i> ${new Date(u.timestamp).toLocaleString('zh-CN')}</span>
                            </div>
                            <div class="update-item-actions">
                                <button class="btn-preview" onclick="previewUpdate('${u.id}')">
                                    <i class="fas fa-eye"></i> 查看
                                </button>
                                <button class="btn-apply" onclick="applyUpdate('${u.id}')">
                                    <i class="fas fa-check"></i> 应用
                                </button>
                                <button class="btn-ignore" onclick="ignoreUpdate('${u.id}')">
                                    <i class="fas fa-times"></i> 忽略
                                </button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            
            batchActions.style.display = 'flex';
        }

        // 预览更新
        async function previewUpdate(updateId) {
            const preview = await window.updateManager.loadUpdatePreview(updateId);
            if (!preview) {
                showErrorToast('加载预览失败');
                return;
            }

            const modal = document.getElementById('previewModal');
            const body = document.getElementById('previewBody');

            body.innerHTML = `
                <div class="preview-stats">
                    <div class="preview-stat">
                        <div class="preview-stat-value add">+${preview.stats.added}</div>
                        <div class="preview-stat-label">新增</div>
                    </div>
                    <div class="preview-stat">
                        <div class="preview-stat-value modify">~${preview.stats.modified}</div>
                        <div class="preview-stat-label">修改</div>
                    </div>
                    <div class="preview-stat">
                        <div class="preview-stat-value delete">-${preview.stats.deleted}</div>
                        <div class="preview-stat-label">删除</div>
                    </div>
                </div>
                <h4>变更详情</h4>
                <ul style="list-style: none; padding: 0;">
                    ${preview.changes.map(c => `
                        <li style="padding: 10px; background: var(--bg-secondary); margin-bottom: 8px; border-radius: var(--radius-sm);">
                            <i class="fas fa-${c.type === 'add' ? 'plus-circle' : c.type === 'modify' ? 'edit' : 'minus-circle'}" 
                               style="color: ${c.type === 'add' ? 'var(--success-color)' : c.type === 'modify' ? 'var(--accent-color)' : 'var(--error-color)'}; margin-right: 8px;"></i>
                            ${c.content}
                        </li>
                    `).join('')}
                </ul>
            `;

            modal.classList.add('active');
        }

        // 关闭预览
        function closePreview() {
            document.getElementById('previewModal').classList.remove('active');
        }

        // 应用更新
        async function applyUpdate(updateId) {
            if (!confirm('确定要应用此更新吗？')) return;

            showLoading('正在应用更新...');
            
            try {
                const result = await window.updateManager.applyUpdate(updateId);
                hideLoading();
                
                if (result.success) {
                    showSuccessToast(`更新成功！新版本: ${result.version}`);
                    updateVersionInfo();
                    renderUpdateHistory();
                    // 重新检查更新
                    checkForUpdates();
                } else {
                    showErrorToast(result.message);
                }
            } catch (error) {
                hideLoading();
                showErrorToast('应用更新失败: ' + error.message);
            }
        }

        // 忽略更新
        function ignoreUpdate(updateId) {
            if (!confirm('确定要忽略此更新吗？')) return;
            
            // 从列表中移除
            const item = document.querySelector(`[data-id="${updateId}"]`);
            if (item) {
                item.remove();
            }
            
            showInfoToast('已忽略更新');
            
            // 检查是否还有更新
            const remaining = document.querySelectorAll('.update-item');
            if (remaining.length === 0) {
                renderPendingUpdates([]);
            }
        }

        // 应用所有更新
        async function applyAllUpdates() {
            const items = document.querySelectorAll('.update-item');
            if (items.length === 0) return;

            if (!confirm(`确定要应用全部 ${items.length} 个更新吗？`)) return;

            showLoading('正在应用所有更新...');
            
            try {
                for (const item of items) {
                    const updateId = item.dataset.id;
                    await window.updateManager.applyUpdate(updateId);
                }
                
                hideLoading();
                showSuccessToast('所有更新已应用');
                updateVersionInfo();
                renderUpdateHistory();
                renderPendingUpdates([]);
            } catch (error) {
                hideLoading();
                showErrorToast('应用更新失败: ' + error.message);
            }
        }

        // 回滚更新
        async function rollbackUpdate() {
            if (!confirm('确定要回滚到上一版本吗？此操作不可撤销。')) return;

            showLoading('正在回滚...');
            
            try {
                const result = await window.updateManager.rollbackUpdate();
                hideLoading();
                
                if (result.success) {
                    showSuccessToast(result.message);
                    updateVersionInfo();
                    renderUpdateHistory();
                } else {
                    showErrorToast(result.message);
                }
            } catch (error) {
                hideLoading();
                showErrorToast('回滚失败: ' + error.message);
            }
        }

        // 导出更新报告
        function exportUpdateReport() {
            const stats = window.updateManager.getUpdateStats();
            const report = {
                exportTime: new Date().toISOString(),
                currentVersion: stats.currentVersion,
                lastUpdate: stats.lastUpdate,
                totalUpdates: stats.totalUpdates,
                history: window.updateManager.updateHistory
            };

            const blob = new Blob([JSON.stringify(report, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `update-report-${stats.currentVersion}.json`;
            a.click();
            URL.revokeObjectURL(url);

            showSuccessToast('报告已导出');
        }

        // 渲染更新历史
        function renderUpdateHistory() {
            const list = document.getElementById('historyList');
            const history = window.updateManager.updateHistory;

            if (!history || history.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 20px;">暂无更新历史</p>';
                return;
            }

            list.innerHTML = history.map((h, index) => `
                <div class="history-item" onclick="showHistoryDetail(${index})" style="cursor: pointer;">
                    <div class="history-item-info">
                        <span class="history-version">${h.version}</span>
                        <span class="history-date">${new Date(h.date).toLocaleString('zh-CN')}</span>
                        <span class="history-changes">${h.changes.length} 项变更</span>
                    </div>
                    <div class="history-status">
                        <i class="fas fa-check-circle"></i>
                        ${h.status === 'published' ? '已发布' : h.status}
                        <i class="fas fa-chevron-right" style="margin-left: 8px; opacity: 0.5;"></i>
                    </div>
                </div>
            `).join('');
        }

        // 显示历史详情
        function showHistoryDetail(historyIndex) {
            const history = window.updateManager.updateHistory[historyIndex];
            if (!history) return;

            const modal = document.createElement('div');
            modal.className = 'preview-modal';
            modal.id = 'historyDetailModal';
            modal.innerHTML = `
                <div class="preview-content" style="max-width: 600px;">
                    <div class="preview-header">
                        <h3><i class="fas fa-history"></i> 更新详情</h3>
                        <button class="preview-close" onclick="closeHistoryDetail()">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="preview-body">
                        <div style="margin-bottom: 20px;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                                <span style="color: var(--text-secondary);">版本号</span>
                                <span style="font-weight: 600;">${history.version}</span>
                            </div>
                            <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                                <span style="color: var(--text-secondary);">更新时间</span>
                                <span>${new Date(history.date).toLocaleString('zh-CN')}</span>
                            </div>
                            <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                                <span style="color: var(--text-secondary);">状态</span>
                                <span class="badge badge-success">${history.status === 'published' ? '已发布' : history.status}</span>
                            </div>
                        </div>
                        
                        <h4 style="margin-bottom: 12px; color: var(--text-primary);">
                            <i class="fas fa-list-ul"></i> 变更明细 (${history.changes.length} 项)
                        </h4>
                        <div style="background: var(--bg-secondary); border-radius: var(--radius-md); padding: 15px;">
                            ${history.changes.map((change, i) => {
                                const changeRecord = getChangeDetail(change);
                                return `
                                    <div style="padding: 12px; border-bottom: 1px solid var(--border-color); ${i === history.changes.length - 1 ? 'border-bottom: none;' : ''}">
                                        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 6px;">
                                            <i class="fas fa-file-code" style="color: var(--primary-color);"></i>
                                            <span style="font-weight: 500;">${changeRecord.name || change}</span>
                                        </div>
                                        <div style="font-size: 0.85rem; color: var(--text-secondary); padding-left: 24px;">
                                            ${changeRecord.file ? `<div>文件: ${changeRecord.file}</div>` : ''}
                                            ${changeRecord.size ? `<div>大小: ${(changeRecord.size / 1024).toFixed(2)} KB</div>` : ''}
                                            ${changeRecord.hash ? `<div style="font-family: monospace; font-size: 0.75rem; margin-top: 4px;">哈希: ${changeRecord.hash.substring(0, 16)}...</div>` : ''}
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            modal.style.display = 'flex';
        }

        // 获取变更详情
        function getChangeDetail(changeId) {
            const appliedChanges = JSON.parse(localStorage.getItem('pm_applied_changes') || '[]');
            return appliedChanges.find(c => c.id === changeId) || { name: changeId };
        }

        // 关闭历史详情
        function closeHistoryDetail() {
            const modal = document.getElementById('historyDetailModal');
            if (modal) {
                modal.remove();
            }
        }

        // Toast 通知
        function showToast(type, title, message) {
            const container = document.getElementById('toastContainer');
            if (!container) return;

            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-times-circle',
                warning: 'fa-exclamation-circle',
                info: 'fa-info-circle'
            };

            toast.innerHTML = `
                <i class="fas ${icons[type]} toast-icon"></i>
                <div class="toast-content">
                    <div class="toast-title">${title}</div>
                    <div class="toast-message">${message}</div>
                </div>
            `;

            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
            
            // 同时发送系统通知（如果用户授权）
            sendSystemNotification(type, title, message);
        }

        // 系统通知功能
        async function sendSystemNotification(type, title, message) {
            // 检查浏览器是否支持通知
            if (!('Notification' in window)) {
                console.log('[Admin] 浏览器不支持系统通知');
                return;
            }
            
            // 请求权限
            if (Notification.permission === 'default') {
                await Notification.requestPermission();
            }
            
            // 发送通知
            if (Notification.permission === 'granted') {
                const icons = {
                    success: '✅',
                    error: '❌',
                    warning: '⚠️',
                    info: 'ℹ️'
                };
                
                new Notification(`Photo Monster - ${title}`, {
                    body: message,
                    icon: '../assets/icon-192x192.png',
                    badge: '../assets/icon-72x72.png',
                    tag: `pm-${type}-${Date.now()}`,
                    requireInteraction: type === 'error' || type === 'warning'
                });
            }
        }

        // 请求通知权限按钮
        function requestNotificationPermission() {
            if (!('Notification' in window)) {
                showInfoToast('您的浏览器不支持系统通知');
                return;
            }
            
            Notification.requestPermission().then(permission => {
                if (permission === 'granted') {
                    showSuccessToast('已开启系统通知');
                    // 发送测试通知
                    new Notification('Photo Monster', {
                        body: '系统通知已开启，有更新时会通知您',
                        icon: '../assets/icon-192x192.png'
                    });
                } else {
                    showInfoToast('通知权限被拒绝');
                }
            });
        }

        function showSuccessToast(message) { showToast('success', '成功', message); }
        function showErrorToast(message) { showToast('error', '错误', message); }
        function showInfoToast(message) { showToast('info', '提示', message); }

        // 加载状态
        function showLoading(text) {
            // 简化实现，实际项目中可以使用更复杂的加载组件
            document.body.style.cursor = 'wait';
        }

        function hideLoading() {
            document.body.style.cursor = '';
        }
    </script>
</body>
</html>
