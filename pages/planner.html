<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/nav-component.css">
    <link rel="stylesheet" href="../css/pages.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<body>
    <!-- 导航栏 -->
    <nav class="navbar" id="main-nav"></nav>

    <!-- 页面标题 -->
    <section class="page-header">
        <div class="container">
            <h1><i class="fas fa-clipboard-list"></i> 方案规划</h1>
            <p>输入拍摄主题，一键生成完整拍摄方案</p>
        </div>
    </section>

    <!-- 拍摄方案规划 -->
    <section id="planner" class="planner-section">
        <div class="container">
            <!-- 方案输入区域（包含自定义方案和模板库） -->
            <div class="planner-input-area">
                <!-- 自定义输入区域 -->
                <div class="input-section">
                    <div class="input-header">
                        <h3><i class="fas fa-pen-fancy"></i> 自定义方案</h3>
                    </div>
                    <div class="input-group">
                        <input type="text" id="plannerInput" placeholder="例如：汉服古风人像、城市夜景、星空银河、婚礼跟拍..." class="planner-input">
                        <button class="btn btn-primary" id="generatePlanBtn">
                            <i class="fas fa-magic"></i> 生成方案
                        </button>
                        <button class="btn btn-ai" id="aiPlanBtn" title="AI智能生成更详细的方案">
                            <i class="fas fa-robot"></i> AI增强
                        </button>
                    </div>
                    <div class="quick-tags">
                        <span class="quick-tag" data-scenario="portrait">人像写真</span>
                        <span class="quick-tag" data-scenario="landscape">风光摄影</span>
                        <span class="quick-tag" data-scenario="hanfu">汉服古风</span>
                        <span class="quick-tag" data-scenario="astro">星空银河</span>
                        <span class="quick-tag" data-scenario="street">街头摄影</span>
                        <span class="quick-tag" data-scenario="wedding">婚礼摄影</span>
                        <span class="quick-tag" data-scenario="macro">微距摄影</span>
                        <span class="quick-tag" data-scenario="product">产品静物</span>
                        <span class="quick-tag" data-scenario="sports">运动赛事</span>
                        <span class="quick-tag" data-scenario="wildlife">野生动物</span>
                    </div>
                </div>

                <!-- 分隔线 -->
                <div class="template-divider">
                    <span>或选择预设模板</span>
                </div>

                <!-- 方案模板库 -->
                <div class="template-library" id="templateLibrary">
                    <div class="template-header">
                        <h3><i class="fas fa-th-large"></i> 方案模板库</h3>
                    </div>
                    <div class="template-categories">
                        <button class="template-cat-btn active" data-category="all">全部</button>
                        <button class="template-cat-btn" data-category="portrait">人像</button>
                        <button class="template-cat-btn" data-category="landscape">风光</button>
                        <button class="template-cat-btn" data-category="event">活动</button>
                        <button class="template-cat-btn" data-category="creative">创意</button>
                    </div>
                    <div class="template-grid" id="templateGrid">
                        <!-- 模板卡片动态生成 -->
                    </div>
                </div>

            <div class="planner-result" id="plannerResult" style="display: none;">

            <!-- AI增强方案结果 -->

                </button>
                <button class="btn btn-secondary" id="favoritePlanBtn" onclick="favoriteCurrentPlan()">

    <!-- 加载脚本 -->
    <script src="../js/nav-component.js"></script>
    <script src="../js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 导出方案功能
            const exportBtn = document.getElementById('exportPlanBtn');
            const printBtn = document.getElementById('printPlanBtn');
            const plannerResult = document.getElementById('plannerResult');

            if (exportBtn) {
                exportBtn.addEventListener('click', function() {
                    const content = plannerResult.innerHTML;
                    const title = document.querySelector('.planner-header h3')?.textContent || '拍摄方案';
                    
                    // 创建完整的 HTML 文档
                    const exportHtml = `
                        <!DOCTYPE html>
                        <html lang="zh-CN">
                        <head>
                            <meta charset="UTF-8">
                            <title>${title}</title>
                            <style>
                                body { font-family: 'Noto Sans SC', sans-serif; padding: 40px; max-width: 800px; margin: 0 auto; }
                                h3 { color: #6366f1; border-bottom: 2px solid #e5e7eb; padding-bottom: 10px; }
                                .plan-section { margin: 20px 0; padding: 20px; background: #f9fafb; border-radius: 8px; }
                                .plan-section h4 { color: #6366f1; margin-bottom: 15px; }
                                ul, ol { padding-left: 20px; }
                                li { margin: 8px 0; }
                                .checklist-category { margin: 15px 0; padding: 15px; background: white; border-radius: 6px; }
                                .timing-item { padding: 15px; margin: 10px 0; border-radius: 6px; }
                                .timing-item.best { background: #d4edda; border: 2px solid #28a745; }
                                .timing-item.good { background: #fff3cd; border: 2px solid #ffc107; }
                                .timing-item.avoid { background: #f8d7da; border: 2px solid #dc3545; }
                            </style>
                        </head>
                        <body>
                            <h1>${title}</h1>
                            <p style="color: #666; margin-bottom: 30px;">生成时间：${new Date().toLocaleString()}</p>
                            ${content}
                            <hr style="margin-top: 40px;">
                            <p style="text-align: center; color: #999; font-size: 0.9rem;">由 Photo Monster 生成</p>
                        </body>
                        </html>
                    `;

                    // 下载文件
                    const blob = new Blob([exportHtml], { type: 'text/html' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `拍摄方案_${new Date().toISOString().slice(0, 10)}.html`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                });
            }

            if (printBtn) {
                printBtn.addEventListener('click', function() {
                    window.print();
                });
            }

            // 监听方案生成完成事件，显示导出按钮
            const observer = new MutationObserver(function(mutations) {
                const exportSection = document.getElementById('plannerExport');
                if (plannerResult.style.display !== 'none' && exportSection) {
                    exportSection.style.display = 'block';
                }
            });

            observer.observe(plannerResult, { attributes: true, attributeFilter: ['style'] });
            
            // AI增强方案功能
            const aiPlanBtn = document.getElementById('aiPlanBtn');
            const plannerInput = document.getElementById('plannerInput');
            const aiPlanResult = document.getElementById('aiPlanResult');
            const aiPlanContent = document.getElementById('aiPlanContent');
            
            if (aiPlanBtn) {
                aiPlanBtn.addEventListener('click', async function() {
                    const topic = plannerInput.value.trim();
                    if (!topic) {
                        alert('请输入拍摄主题');
                        return;
                    }
                    
                    // 显示AI结果区域
                    aiPlanResult.style.display = 'block';
                    aiPlanContent.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> AI 正在生成智能方案...</div>';
                    
                    // 构建提示词
                    const prompt = `请为"${topic}"拍摄场景生成一个详细的摄影方案，包括：
1. 场景分析（适合的光线、时间、场地）
2. 器材推荐（相机、镜头、配件）
3. 参数建议（光圈、快门、ISO设置范围）
4. 构图技巧（具体构图方法和注意事项）
5. 后期建议（调色方向、RAW处理要点）
6. 注意事项（安全、礼貌、突发情况应对）

请用实用的中文回答，详细且可操作。`;
                    
                    // 调用AI
                    if (!window.aiManager || !window.aiManager.isQwenAvailable()) {
                        aiPlanContent.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> 请先在 AI 配置页面启用通义千问</div>';
                        return;
                    }
                    
                    try {
                        const result = await window.aiManager.chat(
                            '你是一位专业摄影导师，擅长各类拍摄场景的方案规划。请用中文详细回答。',
                            prompt,
                            { loadingId: 'aiPlanContent', resultId: 'aiPlanContent', loadingText: 'AI 规划中...' }
                        );
                        if (!result) {
                            aiPlanContent.innerHTML = '<div class="error-message">AI 调用失败，请检查配置</div>';
                        }
                    } catch (error) {
                        aiPlanContent.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-circle"></i> ${error.message}</div>`;
                    }
                });
            }
            
            // 快捷标签也支持AI增强
            document.querySelectorAll('.quick-tag').forEach(tag => {
                tag.addEventListener('click', function() {
                    plannerInput.value = this.textContent;
                });
            });
        });

        // 收藏当前方案
        let currentPlanData = null;

        function favoriteCurrentPlan() {
            const plannerResult = document.getElementById('plannerResult');
            const plannerInput = document.getElementById('plannerInput');
            
            if (!plannerResult || plannerResult.style.display === 'none') {
                alert('请先生成方案');
                return;
            }

            const title = plannerInput.value.trim() || '拍摄方案';
            const content = plannerResult.innerHTML;
            
            // 构建收藏数据
            const planData = {
                type: 'plan',
                id: 'plan_' + Date.now(),
                title: title,
                scenario: title,
                description: title,
                content: content,
                createdAt: new Date().toISOString()
            };

            // 调用收藏API
            const result = addToFavorites(planData);
            if (result.success) {
                // 更新按钮状态
                const btn = document.getElementById('favoritePlanBtn');
                btn.innerHTML = '<i class="fas fa-star"></i> 已收藏';
                btn.disabled = true;
                alert('收藏成功！');
            } else {
                alert(result.message || '收藏失败');
            }
        }

        // 添加到收藏（兼容模式，不依赖 favorites.js 加载）
        function addToFavorites(item) {
            try {
                // 从 localStorage 读取现有收藏
                let favorites = JSON.parse(localStorage.getItem('photoMonster_favorites') || '[]');
                
                // 检查是否已存在
                const exists = favorites.some(f => 
                    f.type === item.type && f.title === item.title
                );
                
                if (exists) {
                    return { success: false, message: '该方案已在收藏中' };
                }
                
                // 添加新收藏
                favorites.push(item);
                localStorage.setItem('photoMonster_favorites', JSON.stringify(favorites));
                
                return { success: true, message: '收藏成功' };
            } catch (e) {
                console.error('收藏失败:', e);
                return { success: false, message: '收藏失败：' + e.message };
            }
        }

        // 检查当前方案是否已收藏（页面加载时调用）
        function checkFavoriteStatus() {
            const plannerInput = document.getElementById('plannerInput');
            const btn = document.getElementById('favoritePlanBtn');
            if (!plannerInput || !btn) return;

            const title = plannerInput.value.trim();
            if (!title) return;

            try {
                const favorites = JSON.parse(localStorage.getItem('photoMonster_favorites') || '[]');
                const isFavorited = favorites.some(f => f.type === 'plan' && f.title === title);
                
                if (isFavorited) {
                    btn.innerHTML = '<i class="fas fa-star"></i> 已收藏';
                    btn.disabled = true;
                }
            } catch (e) {
                console.error('检查收藏状态失败:', e);
            }
        }

        // 监听输入变化，重置收藏按钮
        document.addEventListener('DOMContentLoaded', function() {
            const plannerInput = document.getElementById('plannerInput');
            const btn = document.getElementById('favoritePlanBtn');
            
            if (plannerInput && btn) {
                plannerInput.addEventListener('input', function() {
                    btn.innerHTML = '<i class="far fa-star"></i> 收藏方案';
                    btn.disabled = false;
                });
            }
        });

        // ==================== 模板库功能 ====================

        // 初始化模板库
        function initTemplateLibrary() {
            renderTemplates('all');
            bindTemplateEvents();
        }

        // 渲染模板
        function renderTemplates(category) {
            const grid = document.getElementById('templateGrid');
            if (!grid) return;

            const templates = category === 'all' 
                ? planTemplates 
                : planTemplates.filter(t => t.category === category);

            grid.innerHTML = templates.map(template => `
                <div class="template-card" data-id="${template.id}" onclick="useTemplate('${template.id}')">
                    <div class="template-icon">
                        <i class="fas ${template.icon}"></i>
                    </div>
                    <div class="template-info">
                        <h4>${template.title}</h4>
                        <p>${template.description}</p>
                    </div>
                    <div class="template-action">
                        <i class="fas fa-arrow-right"></i>
                    </div>
                </div>
            `).join('');
        }

        // 绑定分类按钮事件
        function bindTemplateEvents() {
            document.querySelectorAll('.template-cat-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.template-cat-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    renderTemplates(this.dataset.category);
                });
            });
        }

        // 使用模板
        function useTemplate(templateId) {
            const template = planTemplates.find(t => t.id === templateId);
            if (!template) return;

            // 填充输入框
            document.getElementById('plannerInput').value = template.title;

            // 自动生成方案
            generatePlanFromTemplate(template);

            // 滚动到结果区域
            setTimeout(() => {
                document.getElementById('plannerResult').scrollIntoView({ behavior: 'smooth' });
            }, 100);
        }

        // 从模板生成方案
        function generatePlanFromTemplate(template) {
            const plannerResult = document.getElementById('plannerResult');
            const plannerExport = document.getElementById('plannerExport');

            plannerResult.innerHTML = `
                <div class="plan-header">
                    <h2><i class="fas ${template.icon}"></i> ${template.title}</h2>
                    <p class="plan-description">${template.description}</p>
                </div>
                
                <div class="plan-section">
                    <h3><i class="fas fa-camera"></i> 推荐器材</h3>
                    <p>${template.equipment}</p>
                </div>
                
                <div class="plan-section">
                    <h3><i class="fas fa-sliders-h"></i> 相机设置</h3>
                    <p>${template.settings}</p>
                </div>
                
                <div class="plan-section">
                    <h3><i class="fas fa-lightbulb"></i> 拍摄技巧</h3>
                    <p>${template.tips}</p>
                </div>

                <div class="plan-section">
                    <h3><i class="fas fa-list-check"></i> 检查清单</h3>
                    <ul class="checklist">
                        <li><i class="far fa-square"></i> 检查电池电量</li>
                        <li><i class="far fa-square"></i> 准备足够的存储卡</li>
                        <li><i class="far fa-square"></i> 清洁镜头</li>
                        <li><i class="far fa-square"></i> 查看天气预报</li>
                        <li><i class="far fa-square"></i> 确认拍摄地点</li>
                    </ul>
                </div>
            `;

            plannerResult.style.display = 'block';
            plannerExport.style.display = 'block';

            // 保存到历史记录
            savePlanToHistory(template.title, plannerResult.innerHTML);
        }

        // ==================== 导出功能增强 ====================

        // 导出方案
        function exportPlan() {
            const plannerResult = document.getElementById('plannerResult');
            const plannerInput = document.getElementById('plannerInput');
            
            if (plannerResult.style.display === 'none') {
                alert('请先生成方案');
                return;
            }
            
            const title = plannerInput.value.trim() || '拍摄方案';
            showExportOptions(title);
        }

        // 显示导出选项
        function showExportOptions(title) {
            // 移除已存在的弹窗
            const existingModal = document.getElementById('exportModal');
            if (existingModal) existingModal.remove();

            const modal = document.createElement('div');
            modal.id = 'exportModal';
            modal.className = 'modal';
            modal.style.cssText = 'display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;';
            modal.innerHTML = `
                <div class="modal-content" style="background: white; border-radius: 12px; max-width: 400px; width: 90%; box-shadow: 0 4px 20px rgba(0,0,0,0.2);">
                    <div class="modal-header" style="padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
                        <h3 style="margin: 0; color: #333;"><i class="fas fa-download"></i> 导出方案</h3>
                        <button onclick="closeExportModal()" style="background: none; border: none; font-size: 24px; cursor: pointer; color: #999;">&times;</button>
                    </div>
                    <div class="modal-body" style="padding: 20px;">
                        <p style="margin-bottom: 20px; color: #666;">选择导出格式：</p>
                        <div class="export-options" style="display: flex; flex-direction: column; gap: 12px;">
                            <button onclick="exportAsHTML('${title.replace(/'/g, "\\'")}')" style="padding: 15px; border: 1px solid #e5e7eb; border-radius: 8px; background: #f9fafb; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 12px;">
                                <i class="fas fa-file-code" style="font-size: 24px; color: #667eea;"></i>
                                <div>
                                    <div style="font-weight: 500; color: #333;">HTML 文件</div>
                                    <div style="font-size: 12px; color: #999;">可在浏览器中查看</div>
                                </div>
                            </button>
                            <button onclick="exportAsText('${title.replace(/'/g, "\\'")}')" style="padding: 15px; border: 1px solid #e5e7eb; border-radius: 8px; background: #f9fafb; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 12px;">
                                <i class="fas fa-file-alt" style="font-size: 24px; color: #667eea;"></i>
                                <div>
                                    <div style="font-weight: 500; color: #333;">文本文件</div>
                                    <div style="font-size: 12px; color: #999;">纯文本格式</div>
                                </div>
                            </button>
                            <button onclick="exportAsMarkdown('${title.replace(/'/g, "\\'")}')" style="padding: 15px; border: 1px solid #e5e7eb; border-radius: 8px; background: #f9fafb; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 12px;">
                                <i class="fab fa-markdown" style="font-size: 24px; color: #667eea;"></i>
                                <div>
                                    <div style="font-weight: 500; color: #333;">Markdown</div>
                                    <div style="font-size: 12px; color: #999;">适合文档编辑</div>
                                </div>
                            </button>
                        </div>
                    </div>
                </div>
            `;

            document.body.appendChild(modal);
        }

        // 关闭导出弹窗
        function closeExportModal() {
            const modal = document.getElementById('exportModal');
            if (modal) modal.remove();
        }

        // 导出为 HTML
        function exportAsHTML(title) {
            const plannerResult = document.getElementById('plannerResult');
            const content = plannerResult.innerHTML;
            const date = new Date().toLocaleDateString('zh-CN');

            const htmlContent = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${title} - 拍摄方案</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif; 
            padding: 40px; 
            background: #f5f5f5;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }
        h1 { 
            color: #333; 
            margin-bottom: 10px;
            font-size: 28px;
        }
        .date { 
            color: #999; 
            font-size: 14px; 
            margin-bottom: 30px;
        }
        .plan-section { 
            margin-bottom: 30px; 
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .plan-section:last-child { border-bottom: none; }
        .plan-section h3 { 
            color: #667eea; 
            margin-bottom: 15px;
            font-size: 18px;
        }
        .plan-section p, .plan-section li {
            color: #555;
            line-height: 1.8;
        }
        .plan-section ul {
            padding-left: 20px;
        }
        .plan-section li {
            margin-bottom: 8px;
        }
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            text-align: center;
            color: #999;
            font-size: 12px;
        }
        @media print {
            body { background: white; }
            .container { box-shadow: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>${title}</h1>
        <div class="date">生成日期：${date}</div>
        ${content}
        <div class="footer">
            由 Photo Monster 生成
        </div>
    </div>
</body>
</html>`;

            downloadFile(`${title}_拍摄方案.html`, htmlContent, 'text/html');
            closeExportModal();
        }

        // 导出为文本
        function exportAsText(title) {
            const plannerResult = document.getElementById('plannerResult');
            const date = new Date().toLocaleDateString('zh-CN');
            
            let textContent = `${title}\n`;
            textContent += `生成日期：${date}\n`;
            textContent += `${'='.repeat(40)}\n\n`;

            const sections = plannerResult.querySelectorAll('.plan-section');
            sections.forEach(section => {
                const heading = section.querySelector('h3');
                const content = section.querySelector('p, ul');
                
                if (heading) {
                    textContent += `${heading.textContent.trim()}\n`;
                    textContent += `${'-'.repeat(30)}\n`;
                }
                
                if (content) {
                    if (content.tagName === 'UL') {
                        const items = content.querySelectorAll('li');
                        items.forEach(item => {
                            textContent += `[ ] ${item.textContent.trim()}\n`;
                        });
                    } else {
                        textContent += `${content.textContent.trim()}\n`;
                    }
                }
                textContent += '\n';
            });

            textContent += `${'='.repeat(40)}\n`;
            textContent += `由 Photo Monster 生成\n`;

            downloadFile(`${title}_拍摄方案.txt`, textContent, 'text/plain');
            closeExportModal();
        }

        // 导出为 Markdown
        function exportAsMarkdown(title) {
            const plannerResult = document.getElementById('plannerResult');
            const date = new Date().toLocaleDateString('zh-CN');
            
            let mdContent = `# ${title}\n\n`;
            mdContent += `> 生成日期：${date}\n\n`;
            mdContent += `---\n\n`;

            const sections = plannerResult.querySelectorAll('.plan-section');
            sections.forEach(section => {
                const heading = section.querySelector('h3');
                const content = section.querySelector('p, ul');
                
                if (heading) {
                    mdContent += `## ${heading.textContent.trim()}\n\n`;
                }
                
                if (content) {
                    if (content.tagName === 'UL') {
                        const items = content.querySelectorAll('li');
                        items.forEach(item => {
                            mdContent += `- [ ] ${item.textContent.trim()}\n`;
                        });
                    } else {
                        mdContent += `${content.textContent.trim()}\n`;
                    }
                }
                mdContent += '\n';
            });

            mdContent += `---\n\n`;
            mdContent += `*由 Photo Monster 生成*\n`;

            downloadFile(`${title}_拍摄方案.md`, mdContent, 'text/markdown');
            closeExportModal();
        }

        // 下载文件
        function downloadFile(filename, content, mimeType) {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // ==================== 历史记录功能 ====================

        // 保存方案到历史记录
        function savePlanToHistory(title, content) {
            try {
                let history = JSON.parse(localStorage.getItem('photoMonster_plan_history') || '[]');
                
                // 添加新记录到开头
                history.unshift({
                    id: 'plan_' + Date.now(),
                    title: title,
                    content: content,
                    createdAt: new Date().toISOString()
                });
                
                // 最多保留20条
                if (history.length > 20) {
                    history = history.slice(0, 20);
                }
                
                localStorage.setItem('photoMonster_plan_history', JSON.stringify(history));
            } catch (e) {
                console.error('保存历史记录失败:', e);
            }
        }

        // 获取历史记录
        function getPlanHistory() {
            try {
                return JSON.parse(localStorage.getItem('photoMonster_plan_history') || '[]');
            } catch (e) {
                return [];
            }
        }
    </script>
</body>
</html>
