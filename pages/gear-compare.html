<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>器材对比 - Photo Monster</title>
    <meta name="description" content="Photo Monster 器材对比 - 选择最适合你的摄影装备">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/nav-component.css">
    <link rel="stylesheet" href="../css/pages.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 器材对比页面专用样式 */
        .compare-section {
            padding: 40px 20px 60px;
            min-height: calc(100vh - 200px);
        }
        
        /* 对比控制区 */
        .compare-control {
            background: var(--bg-primary);
            border-radius: var(--radius-md);
            padding: 24px;
            margin-bottom: 30px;
            box-shadow: var(--shadow-md);
        }
        
        .compare-type-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .type-btn {
            padding: 10px 20px;
            border: 2px solid var(--border-color);
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
            color: var(--text-primary);
        }
        
        .type-btn:hover {
            border-color: var(--primary-color);
        }
        
        .type-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }
        
        .type-btn i {
            margin-right: 6px;
        }
        
        /* 已选对比项 */
        .selected-items {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            min-height: 80px;
            padding: 16px;
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            border: 2px dashed var(--border-color);
        }
        
        .selected-items.has-items {
            border-style: solid;
            border-color: var(--primary-color);
        }
        
        .selected-item {
            background: var(--bg-primary);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow-sm);
            min-width: 200px;
        }
        
        .selected-item .item-icon {
            width: 48px;
            height: 48px;
            background: var(--primary-light);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--primary-color);
        }
        
        .selected-item .item-info {
            flex: 1;
        }
        
        .selected-item .item-name {
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 2px;
        }
        
        .selected-item .item-brand {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        .selected-item .remove-btn {
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            padding: 4px;
            font-size: 18px;
            transition: transform 0.2s;
        }
        
        .selected-item .remove-btn:hover {
            transform: scale(1.1);
        }
        
        .add-item-btn {
            border: 2px dashed var(--border-color);
            background: transparent;
            border-radius: var(--radius-sm);
            padding: 12px 24px;
            cursor: pointer;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            min-width: 200px;
            justify-content: center;
        }
        
        .add-item-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }
        
        .add-item-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 对比操作按钮 */
        .compare-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        
        .btn-compare {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }
        
        .btn-compare:hover {
            background: var(--primary-dark);
        }
        
        .btn-compare:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .btn-clear {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-clear:hover {
            background: var(--border-color);
        }
        
        /* 对比结果区 */
        .compare-results {
            display: none;
        }
        
        .compare-results.active {
            display: block;
        }
        
        .result-section {
            background: var(--bg-primary);
            border-radius: var(--radius-md);
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-md);
        }
        
        .result-section h3 {
            color: var(--text-primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .result-section h3 i {
            color: var(--primary-color);
        }
        
        /* 参数对比表 */
        .compare-table-wrapper {
            overflow-x: auto;
        }
        
        .compare-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }
        
        .compare-table th,
        .compare-table td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        
        .compare-table th {
            background: var(--bg-secondary);
            font-weight: 500;
            color: var(--text-primary);
            position: sticky;
            left: 0;
            z-index: 1;
        }
        
        .compare-table td {
            color: var(--text-secondary);
        }
        
        .compare-table tr:hover td {
            background: var(--bg-secondary);
        }
        
        .compare-table .param-name {
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .compare-table .highlight {
            color: var(--primary-color);
            font-weight: 500;
        }
        
        .compare-table .best-value {
            background: rgba(46, 204, 113, 0.1);
            color: #27ae60;
            font-weight: 500;
        }
        
        /* 雷达图容器 */
        .radar-chart-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            padding: 20px;
        }
        
        .radar-chart-wrapper {
            text-align: center;
        }
        
        .radar-chart-wrapper h4 {
            margin-bottom: 16px;
            color: var(--text-primary);
        }
        
        .radar-chart {
            width: 280px;
            height: 280px;
        }
        
        /* 优缺点对比 */
        .pros-cons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .pros-cons-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            padding: 20px;
        }
        
        .pros-cons-card h4 {
            color: var(--text-primary);
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border-color);
        }
        
        .pros-cons-card .pros,
        .pros-cons-card .cons {
            margin-bottom: 16px;
        }
        
        .pros-cons-card .pros h5 {
            color: #27ae60;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .pros-cons-card .cons h5 {
            color: #e74c3c;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .pros-cons-card ul {
            margin: 0;
            padding-left: 20px;
        }
        
        .pros-cons-card li {
            color: var(--text-secondary);
            margin: 6px 0;
            font-size: 0.9rem;
        }
        
        /* 推荐结论 */
        .recommendation-card {
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--bg-secondary) 100%);
            border-radius: var(--radius-sm);
            padding: 24px;
            border-left: 4px solid var(--primary-color);
        }
        
        .recommendation-card h4 {
            color: var(--text-primary);
            margin-bottom: 12px;
        }
        
        .recommendation-card p {
            color: var(--text-secondary);
            line-height: 1.8;
        }
        
        /* 选择器弹窗 */
        .selector-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }
        
        .selector-modal.active {
            display: flex;
        }
        
        .selector-modal .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
        }
        
        .selector-modal .modal-content {
            position: relative;
            background: var(--bg-primary);
            border-radius: var(--radius-md);
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }
        
        .selector-modal .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .selector-modal .modal-header h3 {
            margin: 0;
            color: var(--text-primary);
        }
        
        .selector-modal .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
        }
        
        .selector-modal .modal-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }
        
        .selector-filters {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .selector-filters select {
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 0.9rem;
        }
        
        .selector-list {
            display: grid;
            gap: 12px;
        }
        
        .selector-item {
            padding: 16px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .selector-item:hover {
            border-color: var(--primary-color);
            background: var(--bg-secondary);
        }
        
        .selector-item .item-icon {
            width: 48px;
            height: 48px;
            background: var(--primary-light);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--primary-color);
        }
        
        .selector-item .item-info {
            flex: 1;
        }
        
        .selector-item .item-name {
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 2px;
        }
        
        .selector-item .item-specs {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        .selector-item .item-price {
            color: var(--primary-color);
            font-weight: 500;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        
        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .empty-state h4 {
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .compare-type-selector {
                justify-content: center;
            }
            
            .selected-items {
                justify-content: center;
            }
            
            .radar-chart {
                width: 240px;
                height: 240px;
            }
            
            .compare-table {
                font-size: 0.85rem;
            }
            
            .compare-table th,
            .compare-table td {
                padding: 10px 12px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar" id="main-nav"></nav>

    <!-- 页面标题 -->
    <section class="page-header">
        <div class="container">
            <h1><i class="fas fa-balance-scale"></i> 器材对比</h1>
            <p>选择2-4款器材，全方位对比找到最适合你的装备</p>
        </div>
    </section>

    <!-- 器材对比区域 -->
    <section class="compare-section">
        <div class="container">
            <!-- 对比控制区 -->
            <div class="compare-control">
                <!-- 对比类型选择 -->
                <div class="compare-type-selector">
                    <button class="type-btn active" data-type="camera">
                        <i class="fas fa-camera"></i> 相机对比
                    </button>
                    <button class="type-btn" data-type="lens">
                        <i class="fas fa-circle-dot"></i> 镜头对比
                    </button>
                    <button class="type-btn" data-type="combo">
                        <i class="fas fa-sliders-h"></i> 套装对比
                    </button>
                </div>

                <!-- 已选对比项 -->
                <div class="selected-items" id="selectedItems">
                    <button class="add-item-btn" id="addItemBtn">
                        <i class="fas fa-plus"></i> 添加器材
                    </button>
                </div>

                <!-- 操作按钮 -->
                <div class="compare-actions">
                    <button class="btn-compare" id="compareBtn" disabled>
                        <i class="fas fa-balance-scale"></i> 开始对比
                    </button>
                    <button class="btn-clear" id="clearBtn" style="display: none;">
                        <i class="fas fa-trash"></i> 清空
                    </button>
                </div>
            </div>

            <!-- 对比结果区 -->
            <div class="compare-results" id="compareResults">
                <!-- 参数对比表 -->
                <div class="result-section">
                    <h3><i class="fas fa-table"></i> 参数对比</h3>
                    <div class="compare-table-wrapper">
                        <table class="compare-table" id="compareTable">
                            <!-- 动态生成 -->
                        </table>
                    </div>
                </div>

                <!-- 场景评分雷达图 -->
                <div class="result-section">
                    <h3><i class="fas fa-chart-radar"></i> 场景评分对比</h3>
                    <div class="radar-chart-container" id="radarCharts">
                        <!-- 动态生成 -->
                    </div>
                </div>

                <!-- 优缺点对比 -->
                <div class="result-section">
                    <h3><i class="fas fa-thumbs-up"></i> 优缺点分析</h3>
                    <div class="pros-cons-grid" id="prosConsGrid">
                        <!-- 动态生成 -->
                    </div>
                </div>

                <!-- 推荐结论 -->
                <div class="result-section">
                    <h3><i class="fas fa-trophy"></i> 推荐建议</h3>
                    <div class="recommendation-card" id="recommendation">
                        <!-- 动态生成 -->
                    </div>
                </div>
            </div>

            <!-- 空状态 -->
            <div class="empty-state" id="emptyState">
                <i class="fas fa-balance-scale"></i>
                <h4>开始对比</h4>
                <p>选择2-4款相机，从参数、场景评分、优缺点等维度全方位对比</p>
            </div>
        </div>
    </section>

    <!-- 器材选择器弹窗 -->
    <div class="selector-modal" id="selectorModal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-camera"></i> 选择相机</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body">
                <div class="selector-filters">
                    <select id="brandFilter">
                        <option value="">全部品牌</option>
                        <option value="canon">佳能</option>
                        <option value="sony">索尼</option>
                        <option value="nikon">尼康</option>
                        <option value="fujifilm">富士</option>
                        <option value="panasonic">松下</option>
                        <option value="olympus">奥林巴斯</option>
                        <option value="leica">徕卡</option>
                        <option value="hasselblad">哈苏</option>
                    </select>
                    <select id="typeFilter">
                        <option value="">全部类型</option>
                        <option value="fullframe">全画幅</option>
                        <option value="apsc">APS-C</option>
                        <option value="m43">M43</option>
                        <option value="medium">中画幅</option>
                    </select>
                </div>
                <div class="selector-list" id="selectorList">
                    <!-- 动态生成 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Photo Monster. All rights reserved.</p>
            <p>
                <a href="privacy.html">隐私政策</a> · <a href="terms.html">使用条款</a> · <a href="content-complaint.html">侵权投诉</a> · <a href="admin-update.html" style="opacity: 0.6; font-size: 0.85em;">管理</a>
            </p>
        </div>
    </footer>

    <script src="../js/nav-component.js"></script>
    <script src="../js/gear-compare.js"></script>
</body>
</html>
