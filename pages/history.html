<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分析历史 - Photo Monster</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/nav-component.css">
    <link rel="stylesheet" href="../css/pages.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .history-page-section {
            padding: 2rem 0;
        }
        
        .history-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .history-stat-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .history-stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: rgba(0, 200, 200, 0.1);
            color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .history-stat-content {
            flex: 1;
        }
        
        .history-stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .history-stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .history-filters {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-sm);
        }
        
        .history-filters-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .history-filter-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .history-filter-group label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .history-filter-group select,
        .history-filter-group input {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-primary);
            font-size: 0.9rem;
        }
        
        .history-search {
            flex: 1;
            min-width: 200px;
        }
        
        .history-search input {
            width: 100%;
            padding: 0.5rem 1rem 0.5rem 2.5rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-primary);
            font-size: 0.9rem;
        }
        
        .history-search {
            position: relative;
        }
        
        .history-search i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }
        
        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        
        .history-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
            position: relative;
        }
        
        .history-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }
        
        .history-card-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: var(--border-color);
        }
        
        .history-card-content {
            padding: 1.25rem;
        }
        
        .history-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
        }
        
        .history-card-title {
            font-size: 1rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            margin-right: 0.5rem;
        }
        
        .history-card-type {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            background: rgba(0, 200, 200, 0.1);
            color: var(--primary-color);
            white-space: nowrap;
        }
        
        .history-card-type.batch {
            background: rgba(139, 92, 246, 0.1);
            color: #8b5cf6;
        }
        
        .history-card-score {
            display: flex;
            align-items: baseline;
            gap: 0.25rem;
            margin-bottom: 0.75rem;
        }
        
        .history-card-score-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary-color);
        }
        
        .history-card-score-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        
        .history-card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }
        
        .history-card-meta-item {
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        
        .history-card-meta-item i {
            font-size: 0.75rem;
        }
        
        .history-card-highlights {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 1rem;
        }
        
        .history-card-highlight {
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            background: rgba(0, 200, 200, 0.1);
            color: var(--primary-color);
        }
        
        .history-card-highlight.warning {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
        }
        
        .history-card-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .history-card-actions .btn {
            flex: 1;
            padding: 0.5rem;
            font-size: 0.85rem;
        }
        
        .history-card-delete {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(239, 68, 68, 0.9);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.2s ease;
        }
        
        .history-card:hover .history-card-delete {
            opacity: 1;
        }
        
        .history-card-delete:hover {
            background: #dc2626;
            transform: scale(1.1);
        }
        
        .history-empty {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }
        
        .history-empty i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        
        .history-empty h3 {
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }
        
        .history-pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-top: 2rem;
            padding: 1rem;
        }
        
        .history-pagination button {
            padding: 0.5rem 1rem;
        }
        
        .history-pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .history-page-info {
            color: var(--text-secondary);
        }
        
        @media (max-width: 768px) {
            .history-filters-row {
                flex-direction: column;
                align-items: stretch;
            }
            
            .history-filter-group {
                width: 100%;
            }
            
            .history-filter-group select,
            .history-search input {
                width: 100%;
            }
            
            .history-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar" id="main-nav"></nav>

    <!-- 页面标题 -->
    <section class="page-header">
        <div class="container">
            <h1><i class="fas fa-history"></i> 分析历史</h1>
            <p>查看和管理您的所有照片分析记录</p>
        </div>
    </section>

    <!-- 统计区域 -->
    <section class="history-page-section">
        <div class="container">
            <div class="history-stats">
                <div class="history-stat-card">
                    <div class="history-stat-icon">
                        <i class="fas fa-images"></i>
                    </div>
                    <div class="history-stat-content">
                        <div class="history-stat-value" id="totalCount">0</div>
                        <div class="history-stat-label">总分析数</div>
                    </div>
                </div>
                <div class="history-stat-card">
                    <div class="history-stat-icon">
                        <i class="fas fa-star"></i>
                    </div>
                    <div class="history-stat-content">
                        <div class="history-stat-value" id="avgScore">0</div>
                        <div class="history-stat-label">平均评分</div>
                    </div>
                </div>
                <div class="history-stat-card">
                    <div class="history-stat-icon">
                        <i class="fas fa-calendar"></i>
                    </div>
                    <div class="history-stat-content">
                        <div class="history-stat-value" id="thisMonth">0</div>
                        <div class="history-stat-label">本月分析</div>
                    </div>
                </div>
            </div>

            <!-- 筛选区域 -->
            <div class="history-filters">
                <div class="history-filters-row">
                    <div class="history-search">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="搜索文件名...">
                    </div>
                    <div class="history-filter-group">
                        <label>类型:</label>
                        <select id="typeFilter">
                            <option value="all">全部</option>
                            <option value="single">单张分析</option>
                            <option value="batch">批量分析</option>
                        </select>
                    </div>
                    <div class="history-filter-group">
                        <label>排序:</label>
                        <select id="sortFilter">
                            <option value="newest">最新优先</option>
                            <option value="oldest">最早优先</option>
                            <option value="score-high">评分从高到低</option>
                            <option value="score-low">评分从低到高</option>
                        </select>
                    </div>
                    <button class="btn btn-secondary" id="clearAllHistory">
                        <i class="fas fa-trash"></i> 清空历史
                    </button>
                </div>
            </div>

            <!-- 历史记录列表 -->
            <div class="history-grid" id="historyGrid">
                <!-- 动态生成 -->
            </div>

            <!-- 分页 -->
            <div class="history-pagination" id="pagination" style="display: none;">
                <button class="btn btn-outline" id="prevPage" disabled>
                    <i class="fas fa-chevron-left"></i> 上一页
                </button>
                <span class="history-page-info">
                    第 <span id="currentPage">1</span> 页 / 共 <span id="totalPages">1</span> 页
                </span>
                <button class="btn btn-outline" id="nextPage" disabled>
                    下一页 <i class="fas fa-chevron-right"></i>
                </button>
            </div>

            <!-- 空状态 -->
            <div class="history-empty" id="emptyState" style="display: none;">
                <i class="fas fa-inbox"></i>
                <h3>暂无分析记录</h3>
                <p>上传照片开始分析，您的历史记录将显示在这里</p>
                <a href="photo-analysis.html" class="btn btn-primary" style="margin-top: 1rem;">
                    <i class="fas fa-camera"></i> 开始分析
                </a>
            </div>
        </div>
    </section>

    <!-- 加载脚本 -->
    <script src="../js/nav-component.js"></script>
    <script src="../js/history.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
